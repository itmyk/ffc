<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来予創組織 - 因果律固定システム</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+JP:wght@700;900&family=Share+Tech+Mono&display=swap');

body {
background-color: #02040a;
color: #e0e0e0;
font-family: 'Noto Serif JP', serif;
margin: 0;
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
overflow: hidden;
/* 背景をより深く、宇宙の深淵のようなグラデーションに */
background: radial-gradient(circle at center, #0a1931 0%, #02040a 80%);
position: relative;
}

/* スキャナライン効果（よりシステムっぽく） */
body::before {
content: " ";
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
background-size: 100% 2px, 3px 100%;
pointer-events: none;
z-index: 1000;
}

.shake { animation: screenShake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
@keyframes screenShake {
10%, 90% { transform: translate3d(-1px, 0, 0); }
20%, 80% { transform: translate3d(2px, 0, 0); }
30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* --- カットイン演出 --- */
#cut-in {
position: fixed;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
width: 100%;
height: 0;
background: rgba(0, 0, 0, 0.98);
display: flex;
align-items: center;
justify-content: center;
z-index: 2000;
overflow: hidden;
pointer-events: none;
border-top: 1px solid #00f2ff;
border-bottom: 1px solid #00f2ff;
opacity: 0;
transition: height 0.15s ease, opacity 0.1s ease;
}

#cut-in.active {
height: 220px;
opacity: 1;
visibility: visible;
animation: cutInPulse 0.4s infinite alternate;
}

#cut-in-text {
font-family: 'Cinzel', serif;
font-size: clamp(1.5rem, 8vw, 3.5rem);
font-weight: 900;
color: #fff;
text-shadow: 0 0 15px #00f2ff, 0 0 30px #00f2ff;
letter-spacing: 0.5rem;
text-transform: uppercase;
}

@keyframes cutInPulse {
from { box-shadow: inset 0 0 20px #00f2ff; }
to { box-shadow: inset 0 0 50px #00f2ff; }
}

/* --- UIパーツ --- */
.main-title {
font-size: clamp(1.5rem, 7vw, 2.8rem);
margin-bottom: 5px;
font-family: 'Cinzel', serif;
background: linear-gradient(180deg, #fff 30%, #4fc3f7 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: 0.3rem;
filter: drop-shadow(0 0 10px rgba(79, 195, 247, 0.8));
z-index: 10;
}

#incantation {
font-family: 'Share Tech Mono', monospace;
font-size: 0.85rem;
color: #4fc3f7;
letter-spacing: 0.1rem;
margin-bottom: 20px;
opacity: 0.8;
text-transform: uppercase;
}

.display-container {
position: relative;
width: 90%;
max-width: 850px;
height: 280px;
background: rgba(2, 4, 10, 0.8);
border: 1px solid rgba(79, 195, 247, 0.3);
box-shadow: 0 0 40px rgba(0, 0, 0, 1), inset 0 0 20px rgba(79, 195, 247, 0.1);
display: flex;
align-items: center;
justify-content: center;
backdrop-filter: blur(10px);
z-index: 10;
}

#result {
font-size: clamp(1rem, 4.5vw, 2.2rem);
text-align: center;
padding: 20px;
color: #b3e5fc;
font-weight: 900;
transition: all 0.2s;
}

.decided {
animation: observerEffect 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
color: #fff !important;
text-shadow: 0 0 20px #4fc3f7, 0 0 40px #1a237e;
}

@keyframes observerEffect {
0% { transform: scale(1.5); filter: blur(20px) brightness(3); opacity: 0; }
100% { transform: scale(1); filter: blur(0px) brightness(1); opacity: 1; }
}

#drawBtn {
margin-top: 40px;
background: transparent;
color: #4fc3f7;
border: 1px solid #4fc3f7;
padding: 15px 40px;
font-family: 'Share Tech Mono', monospace;
font-size: 1.1rem;
cursor: pointer;
position: relative;
overflow: hidden;
transition: 0.3s;
z-index: 10;
}

#drawBtn:hover {
background: #4fc3f7;
color: #02040a;
box-shadow: 0 0 25px #4fc3f7;
}

.floating-text {
position: absolute;
font-family: 'Share Tech Mono', monospace;
pointer-events: none;
z-index: 5;
animation: matrixFade 1.2s linear forwards;
}

@keyframes matrixFade {
0% { transform: translateY(0); opacity: 1; filter: brightness(2); }
100% { transform: translateY(-50px); opacity: 0; }
}

.flash {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: #fff;
opacity: 0;
pointer-events: none;
z-index: 3000;
}
.flash-anim { animation: finalFlash 0.5s ease-out; }
@keyframes finalFlash {
0% { opacity: 1; }
100% { opacity: 0; }
}
</style>
</head>
<body>

<div id="effect-layer"></div>
<div class="flash" id="flash-effect"></div>

<div id="cut-in">
<div id="cut-in-text">Observation Fixed.</div>
</div>

<div class="main-title">未来予創組織</div>
<div id="incantation">PROJECT: LAPLACE_DEMON / 因果律干渉プロトコル</div>

<div class="display-container" id="container">
<div id="result">STANDING BY...</div>
</div>

<button id="drawBtn" onclick="runFortuneTelling()">BOOT STRAP CAUSALITY</button>

<script>
const departments = [
"第1マーケティング局（ビジネスプロデュース付）",
"第2マーケティング局（ビジネスプロデュース付）",
"第3マーケティング局（ビジネスプロデュース付）",
"第4マーケティング局（ビジネスプロデュース付）",
"第5マーケティング局（ビジネスプロデュース付）",
"第6マーケティング局（ビジネスプロデュース付）",
"第7マーケティング局（ビジネスプロデュース付）",
"第8マーケティング局（ビジネスプロデュース付）",
"第1ビジネストランスフォーメーション局",
"第2ビジネストランスフォーメーション局",
"第1マーケティング局",
"第2マーケティング局",
"第3マーケティング局",
"第4マーケティング局",
"第5マーケティング局",
"第6マーケティング局",
"第7マーケティング局",
"第8マーケティング局",
"データ・テクノロジーセンター",
"リテールマーケティング局",
"データマーケティング局",
"1CRプランニング局",
"2CRプランニング局",
"3CRプランニング局",
"4CRプランニング局",
"5CRプランニング局",
"6CRランニング局",
"zero",
"BXクリエイティブセンター",
"CXクリエイティブセンター",
"ラジオテレビ局",
"ラジオテレビビジネスプロデュース局",
"ラジオテレビ（電通デジタル出向）",
"関西ラジオテレビ&コンテンツビジネス局",
"新聞局",
"出版ビジネス・プロデュース局",
"OOHビジネス局",
"スポーツビジネスプロデュース局",
"エンターテインメントビジネス・センター",
"電通コーポレートワン人事オフィス出向"
];

let effectTimer;

function spawnText() {
const container = document.getElementById('effect-layer');
const words = [
"QUANTUM_STATE: UNSTABLE", 
"DIVERGENCE_CHECK...", 
"CAUSALITY_COLLAPSE", 
"FETCHING_TIMELINE", 
"PROBABILITY: 0.000034%", 
"LAPLACE_ERROR", 
"OBSERVER_INTERVENTION",
"SINGULARITY",
"ENTROPY_REVERSAL"
];
const span = document.createElement('span');
span.innerText = words[Math.floor(Math.random() * words.length)];
span.className = 'floating-text';
span.style.left = (Math.random() * 90) + '%';
span.style.top = (Math.random() * 90) + '%';
span.style.color = Math.random() > 0.8 ? "#ff0055" : "#00f2ff";
span.style.fontSize = "0.7rem";
container.appendChild(span);
setTimeout(() => span.remove(), 1200);
}

function runFortuneTelling() {
const resultDiv = document.getElementById("result");
const btn = document.getElementById("drawBtn");
const incant = document.getElementById("incantation");
const flash = document.getElementById("flash-effect");
const cutIn = document.getElementById("cut-in");

btn.disabled = true;
resultDiv.classList.remove("decided");
incant.innerText = "シュレディンガーの猫を観測中。事象の波を収束させています...";

effectTimer = setInterval(spawnText, 80);

let duration = 3000;
let startTime = Date.now();

const timer = setInterval(() => {
const elapsed = Date.now() - startTime;
resultDiv.style.filter = `blur(${Math.random() * 2}px)`;
resultDiv.innerText = departments[Math.floor(Math.random() * departments.length)];

if (elapsed > duration) {
clearInterval(timer);
clearInterval(effectTimer);
showCutIn();
}
}, 60);

function showCutIn() {
cutIn.classList.add("active");

setTimeout(() => {
cutIn.classList.remove("active");

flash.classList.add("flash-anim");
document.body.classList.add("shake");

const finalDept = departments[Math.floor(Math.random() * departments.length)];
resultDiv.style.filter = "none";
resultDiv.innerText = finalDept;
resultDiv.classList.add("decided");
incant.innerText = "観測完了。このタイムラインにおける「真実」が固定されました。";

confetti({
particleCount: 150,
spread: 100,
origin: { y: 0.5 },
colors: ['#00f2ff', '#ffffff', '#1a237e'],
disableForReducedMotion: true
});

setTimeout(() => {
flash.classList.remove("flash-anim");
document.body.classList.remove("shake");
btn.disabled = false;
}, 1000);
}, 1000); 
}
}
</script>
</body>
</html>
